<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>通知公告详情 - 图书借阅管理系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
    }
    .navbar {
      background-color: #343a40;
    }
    .notification-detail {
      margin: 40px 0;
    }
    .footer {
      background-color: #343a40;
      color: white;
      padding: 20px 0;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">图书借阅管理系统</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">首页</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="books.html">图书信息</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="news.html">图书资讯</a>
          </li>
          <li class="nav-item active">
            <a class="nav-link" href="notifications.html">通知公告</a>
          </li>
        </ul>
        <ul class="navbar-nav">
          <li class="nav-item" id="login-item">
            <a class="nav-link" href="login.html">登录</a>
          </li>
          <li class="nav-item" id="register-item">
            <a class="nav-link" href="register.html">注册</a>
          </li>
          <li class="nav-item dropdown" id="user-dropdown" style="display: none;">
            <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
              <span id="user-name"></span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="personal.html">个人中心</a></li>
              <li><a class="dropdown-item" href="#" id="logout-btn">退出登录</a></li>
            </ul>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="notification-detail">
      <div id="notification-content">
        <!-- 通知公告详情将通过JavaScript动态加载 -->
      </div>
    </div>
  </div>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <div class="row">
        <div class="col-md-4">
          <h4>关于我们</h4>
          <p>我们是一个致力于为读者提供优质图书资源的图书馆。</p>
        </div>
        <div class="col-md-4">
          <h4>联系方式</h4>
          <p>电话：12345678900</p>
          <p>邮箱：contact@library.com</p>
        </div>
        <div class="col-md-4">
          <h4>快速链接</h4>
          <ul class="list-unstyled">
            <li><a href="index.html" class="text-white">首页</a></li>
            <li><a href="books.html" class="text-white">图书信息</a></li>
            <li><a href="news.html" class="text-white">图书资讯</a></li>
            <li><a href="notifications.html" class="text-white">通知公告</a></li>
          </ul>
        </div>
      </div>
      <div class="text-center mt-4">
        <p>&copy; 2026 图书借阅管理系统. 保留所有权利.</p>
      </div>
    </div>
  </footer>

  <script>
    // 检查登录状态
    function checkLogin() {
      const token = localStorage.getItem('token');
      const userStr = localStorage.getItem('user');
      if (token && userStr) {
        // 已登录
        document.getElementById('login-item').style.display = 'none';
        document.getElementById('register-item').style.display = 'none';
        document.getElementById('user-dropdown').style.display = 'block';
        const user = JSON.parse(userStr);
        document.getElementById('user-name').textContent = user.name || user.username;
      }
    }

    // 退出登录
    document.getElementById('logout-btn').addEventListener('click', function(e) {
      e.preventDefault();
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.reload();
    });

    // 获取URL参数
    function getUrlParam(name) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(name);
    }

    // 加载通知公告详情
    function loadNotificationDetail() {
      const notificationId = getUrlParam('id');
      if (!notificationId) {
        window.location.href = 'notifications.html';
        return;
      }

      // 由于没有单独的通知公告详情API，我们从列表中获取
      fetch('http://localhost:3000/api/notifications')
        .then(response => response.json())
        .then(data => {
          if (data.code === 200) {
            const notification = data.data.find(n => n.id == notificationId);
            if (notification) {
              const notificationContent = document.getElementById('notification-content');
              notificationContent.innerHTML = `
                <h2>${notification.title}</h2>
                <p class="text-muted">${new Date(notification.created_at).toLocaleString()}</p>
                <div class="mt-4">${notification.content}</div>
                <a href="notifications.html" class="btn btn-primary mt-4">返回列表</a>
              `;
            } else {
              window.location.href = 'notifications.html';
            }
          }
        })
        .catch(error => console.error('加载通知公告详情失败:', error));
    }

    // 初始化
    document.addEventListener('DOMContentLoaded', function() {
      checkLogin();
      loadNotificationDetail();
    });
  </script>
</body>
</html>
