<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>图书详情 - 图书借阅管理系统</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
    }
    .navbar {
      background-color: #343a40;
    }
    .book-detail {
      margin: 40px 0;
    }
    .book-cover {
      max-width: 300px;
      height: auto;
    }
    .book-info {
      margin-top: 20px;
    }
    .action-buttons {
      margin: 20px 0;
    }
    .comments-section {
      margin-top: 40px;
    }
    .comment {
      margin-bottom: 20px;
      padding: 15px;
      border: 1px solid #e9ecef;
      border-radius: 5px;
    }
    .footer {
      background-color: #343a40;
      color: white;
      padding: 20px 0;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <!-- 导航栏 -->
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="index.html">图书借阅管理系统</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">首页</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="books.html">图书信息</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="news.html">图书资讯</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="notifications.html">通知公告</a>
          </li>
        </ul>
        <ul class="navbar-nav">
          <li class="nav-item" id="login-item">
            <a class="nav-link" href="login.html">登录</a>
          </li>
          <li class="nav-item" id="register-item">
            <a class="nav-link" href="register.html">注册</a>
          </li>
          <li class="nav-item dropdown" id="user-dropdown" style="display: none;">
            <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
              <span id="user-name"></span>
            </a>
            <ul class="dropdown-menu dropdown-menu-end">
              <li><a class="dropdown-item" href="personal.html">个人中心</a></li>
              <li><a class="dropdown-item" href="#" id="logout-btn">退出登录</a></li>
            </ul>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="container">
    <div class="book-detail">
      <div class="row" id="book-content">
        <!-- 图书详情将通过JavaScript动态加载 -->
      </div>
    </div>


  </div>

  <!-- 页脚 -->
  <footer class="footer">
    <div class="container">
      <div class="row">
        <div class="col-md-4">
          <h4>关于我们</h4>
          <p>我们是一个致力于为读者提供优质图书资源的图书馆。</p>
        </div>
        <div class="col-md-4">
          <h4>联系方式</h4>
          <p>电话：12345678900</p>
          <p>邮箱：contact@library.com</p>
        </div>
        <div class="col-md-4">
          <h4>快速链接</h4>
          <ul class="list-unstyled">
            <li><a href="index.html" class="text-white">首页</a></li>
            <li><a href="books.html" class="text-white">图书信息</a></li>
            <li><a href="news.html" class="text-white">图书资讯</a></li>
            <li><a href="notifications.html" class="text-white">通知公告</a></li>
          </ul>
        </div>
      </div>
      <div class="text-center mt-4">
        <p>&copy; 2026 图书借阅管理系统. 保留所有权利.</p>
      </div>
    </div>
  </footer>

  <script>
    // 检查登录状态
    function checkLogin() {
      const token = localStorage.getItem('token');
      const userStr = localStorage.getItem('user');
      if (token && userStr) {
        // 已登录
        document.getElementById('login-item').style.display = 'none';
        document.getElementById('register-item').style.display = 'none';
        document.getElementById('user-dropdown').style.display = 'block';
        const user = JSON.parse(userStr);
        document.getElementById('user-name').textContent = user.name || user.username;
      }
    }

    // 退出登录
    document.getElementById('logout-btn').addEventListener('click', function(e) {
      e.preventDefault();
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.reload();
    });

    // 获取URL参数
    function getUrlParam(name) {
      const urlParams = new URLSearchParams(window.location.search);
      return urlParams.get(name);
    }

    // 加载图书详情
    function loadBookDetail() {
      const bookId = getUrlParam('id');
      if (!bookId) {
        window.location.href = 'books.html';
        return;
      }

      fetch(`http://localhost:3000/api/books/${bookId}`)
        .then(response => response.json())
        .then(data => {
          if (data.code === 200) {
            const book = data.data;
            const bookContent = document.getElementById('book-content');
            
            // 构建封面图片的 data URI
            let coverSrc;
            if (book.cover) {
              coverSrc = book.cover;
            } else {
              // 使用 JavaScript 构建包含书名的 SVG
              const svgContent = `
                <svg width="300" height="400" xmlns="http://www.w3.org/2000/svg">
                  <rect width="300" height="400" fill="#f5f5f5"/>
                  <text x="150" y="200" font-size="16" text-anchor="middle" fill="#666" font-family="Arial, sans-serif">${book.title}</text>
                </svg>
              `;
              coverSrc = 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svgContent);
            }
            
            bookContent.innerHTML = `
              <div class="col-md-4">
                <img src="${coverSrc}" class="book-cover img-fluid" alt="${book.title}">
              </div>
              <div class="col-md-8">
                <div class="book-info">
                  <h2>${book.title}</h2>
                  <p><strong>作者:</strong> ${book.author}</p>
                  <p><strong>出版日期:</strong> ${book.publish_date}</p>
                  <p><strong>可借数量:</strong> ${book.available_count}/${book.total_count}</p>
                  <p><strong>简介:</strong> ${book.description}</p>
                  <div class="action-buttons">
                    ${book.available_count > 0 ? `<button id="borrow-btn" class="btn btn-primary">借书</button>` : `<button class="btn btn-secondary" disabled>已借完</button>`}
                  </div>
                </div>
              </div>
            `;

            // 绑定事件
            bindEvents(bookId);
          } else {
            window.location.href = 'books.html';
          }
        })
        .catch(error => console.error('加载图书详情失败:', error));
    }

    // 绑定事件
    function bindEvents(bookId) {
      // 借书按钮
      const borrowBtn = document.getElementById('borrow-btn');
      if (borrowBtn) {
        borrowBtn.addEventListener('click', function() {
          const token = localStorage.getItem('token');
          if (!token) {
            alert('请先登录');
            window.location.href = 'login.html';
            return;
          }

          fetch('http://localhost:3000/api/borrow', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': token
            },
            body: JSON.stringify({ book_id: bookId })
          })
          .then(response => response.json())
          .then(data => {
            if (data.code === 200) {
              alert('借书成功');
              window.location.reload();
            } else {
              alert(data.message);
            }
          })
          .catch(error => console.error('借书失败:', error));
        });
      }


    }



    // 初始化
    document.addEventListener('DOMContentLoaded', function() {
      checkLogin();
      loadBookDetail();
    });
  </script>
</body>
</html>
